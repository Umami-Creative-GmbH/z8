apiVersion: v1
kind: ServiceAccount
metadata:
  name: deploy-webhook
  namespace: app-prod
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: deploy-webhook
  namespace: app-prod
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    resourceNames: ["web", "worker", "docs", "marketing"]
    verbs: ["get", "update"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "create", "delete"]
  - apiGroups: ["batch"]
    resources: ["jobs/status"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["deploy-webhook-state"]
    verbs: ["get", "update"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: deploy-webhook
  namespace: app-prod
subjects:
  - kind: ServiceAccount
    name: deploy-webhook
    namespace: app-prod
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: deploy-webhook
