apiVersion: apps/v1
kind: Deployment
metadata:
  name: deploy-webhook
  namespace: app-prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: deploy-webhook
  template:
    metadata:
      labels:
        app: deploy-webhook
    spec:
      enableServiceLinks: false
      serviceAccountName: deploy-webhook
      imagePullSecrets:
        - name: ghcr-credentials
      containers:
        - name: deploy-webhook
          image: ghcr.io/umami-creative-gmbh/z8-deploy-webhook:latest
          imagePullPolicy: Always
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "8080"
            - name: NAMESPACE
              value: app-prod
            - name: GITHUB_OWNER
              value: umami-creative-gmbh
            - name: GITHUB_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: deploy-webhook-secrets
                  key: github-webhook-secret
            - name: GHCR_TOKEN
              valueFrom:
                secretKeyRef:
                  name: deploy-webhook-secrets
                  key: ghcr-token
                  optional: true
            - name: GHCR_USERNAME
              valueFrom:
                secretKeyRef:
                  name: deploy-webhook-secrets
                  key: ghcr-username
                  optional: true
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
