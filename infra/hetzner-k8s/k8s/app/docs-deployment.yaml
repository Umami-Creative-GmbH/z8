apiVersion: apps/v1
kind: Deployment
metadata:
  name: docs
  namespace: app-prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: docs
  template:
    metadata:
      labels:
        app: docs
    spec:
      enableServiceLinks: false
      imagePullSecrets:
        - name: ghcr-credentials
      containers:
        - name: docs
          image: ghcr.io/umami-creative-gmbh/z8-docs:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: 3001
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 768Mi
