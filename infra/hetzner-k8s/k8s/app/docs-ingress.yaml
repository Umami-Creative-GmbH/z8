apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: docs
  namespace: app-prod
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - docs.z8-time.app
      secretName: docs-tls
  rules:
    - host: docs.z8-time.app
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: docs
                port:
                  number: 80
