apiVersion: apps/v1
kind: Deployment
metadata:
  name: marketing
  namespace: app-prod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: marketing
  template:
    metadata:
      labels:
        app: marketing
    spec:
      enableServiceLinks: false
      imagePullSecrets:
        - name: ghcr-credentials
      containers:
        - name: marketing
          image: ghcr.io/umami-creative-gmbh/z8-marketing:sha-321dde6
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 768Mi
