apiVersion: batch/v1
kind: CronJob
metadata:
  name: vault-auto-unseal
  namespace: app-prod
spec:
  schedule: "*/1 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 300
      backoffLimit: 0
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: vault-auto-unseal
              image: hashicorp/vault:1.16.2
              env:
                - name: VAULT_ADDR
                  value: http://vault.vault.svc.cluster.local:8200
                - name: VAULT_UNSEAL_KEY
                  valueFrom:
                    secretKeyRef:
                      name: app-secrets
                      key: VAULT_UNSEAL_KEY
              command:
                - sh
                - -c
                - |
                  status="$(vault status -format=json 2>/dev/null || true)"

                  if echo "$status" | grep -q '"sealed":[[:space:]]*true'; then
                    vault operator unseal "$VAULT_UNSEAL_KEY"
                  elif echo "$status" | grep -q '"sealed":[[:space:]]*false'; then
                    echo "Vault already unsealed"
                  else
                    echo "Unable to determine Vault seal status"
                    exit 1
                  fi
