apiVersion: v1
kind: ConfigMap
metadata:
  name: z8-config
  namespace: z8
  labels:
    app.kubernetes.io/name: z8
data:
  # Application URLs
  app-url: "https://app.example.com"
  auth-url: "https://app.example.com"

  # Database (host/port - credentials in Secret)
  postgres-host: "z8-postgresql"
  postgres-port: "5432"
  postgres-db: "z8"

  # Cache
  redis-host: "z8-valkey"
  redis-port: "6379"
  redis-tls: "false"

  # Worker configuration
  worker-concurrency: "5"
  enable-cron-jobs: "true"

  # Email
  email-from: "noreply@yourdomain.com"
  smtp-host: ""
  smtp-port: "587"
  smtp-from-email: "noreply@yourdomain.com"
  smtp-from-name: "Z8"
  # Optional strict provider. Uncomment to force one provider.
  # email-provider: "resend"
  # Optional SMTP transport flags.
  # smtp-secure: "false"
  # smtp-require-tls: "true"

  # Logging
  log-level: "info"
