name: Publish Docker Images

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-images-${{ github.ref }}
  cancel-in-progress: true

env:
  DIGEST_ROOT: /tmp/digests
  IMAGE_NAMESPACE: umami-creative-gmbh
  REGISTRY: ghcr.io

jobs:
  publish-targets:
    name: Publish Target (${{ matrix.repository }} ${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 120

    strategy:
      fail-fast: true
      matrix:
        include:
          - repository: z8-webapp
            dockerfile: docker/Dockerfile.webapp
            arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - repository: z8-webapp
            dockerfile: docker/Dockerfile.webapp
            arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
          - repository: z8-worker
            dockerfile: docker/Dockerfile.worker
            arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - repository: z8-worker
            dockerfile: docker/Dockerfile.worker
            arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
          - repository: z8-migration
            dockerfile: docker/Dockerfile.migration
            arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - repository: z8-migration
            dockerfile: docker/Dockerfile.migration
            arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify workflow contract
        run: node scripts/ci/verify-publish-images-workflow.mjs

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push target image by digest
        id: build_target
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./${{ matrix.dockerfile }}
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.repository }},push-by-digest=true,name-canonical=true,push=true
          build-args: |
            NEXT_PUBLIC_BUILD_HASH=${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.repository }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.repository }}-${{ matrix.arch }}

      - name: Export target artifact
        env:
          IMAGE_REFERENCE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.repository }}
          IMAGE_DIGEST: ${{ steps.build_target.outputs.digest }}
        run: |
          set -euo pipefail

          if [ -z "${IMAGE_DIGEST}" ]; then
            echo "::error::target artifact digest is empty"
            exit 1
          fi

          if [ "${IMAGE_DIGEST#sha256:}" = "${IMAGE_DIGEST}" ]; then
            echo "::error::target artifact digest must start with sha256:"
            exit 1
          fi

          IMAGE_REFERENCE_WITH_DIGEST="${IMAGE_REFERENCE}@${IMAGE_DIGEST}"
          ARTIFACT_DIR="${DIGEST_ROOT}/targets/${{ matrix.repository }}/${{ matrix.arch }}"
          mkdir -p "${ARTIFACT_DIR}"

          printf '%s\n' "${IMAGE_REFERENCE_WITH_DIGEST}" > "${ARTIFACT_DIR}/reference.txt"
          printf '%s\n' "${IMAGE_DIGEST}" > "${ARTIFACT_DIR}/digest.txt"
          printf '%s\n' "${IMAGE_REFERENCE}" > "${ARTIFACT_DIR}/repository.txt"
          printf '%s\n' "${{ matrix.arch }}" > "${ARTIFACT_DIR}/arch.txt"

          if [ ! -s "${ARTIFACT_DIR}/reference.txt" ]; then
            echo "::error::target artifact is missing reference.txt"
            exit 1
          fi
          if [ ! -s "${ARTIFACT_DIR}/digest.txt" ]; then
            echo "::error::target artifact is missing digest.txt"
            exit 1
          fi
          if [ ! -s "${ARTIFACT_DIR}/repository.txt" ]; then
            echo "::error::target artifact is missing repository.txt"
            exit 1
          fi
          if [ ! -s "${ARTIFACT_DIR}/arch.txt" ]; then
            echo "::error::target artifact is missing arch.txt"
            exit 1
          fi

      - name: Upload target artifact
        uses: actions/upload-artifact@v4
        with:
          name: target-digest-${{ matrix.repository }}-${{ matrix.arch }}
          path: ${{ env.DIGEST_ROOT }}/targets/${{ matrix.repository }}/${{ matrix.arch }}
          if-no-files-found: error

  publish-manifests:
    name: Publish Manifests (${{ matrix.repository }})
    needs: publish-targets
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: true
      matrix:
        repository:
          - z8-webapp
          - z8-worker
          - z8-migration

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download amd64 digest
        uses: actions/download-artifact@v4
        with:
          name: target-digest-${{ matrix.repository }}-amd64
          path: ${{ env.DIGEST_ROOT }}/targets/amd64

      - name: Download arm64 digest
        uses: actions/download-artifact@v4
        with:
          name: target-digest-${{ matrix.repository }}-arm64
          path: ${{ env.DIGEST_ROOT }}/targets/arm64

      - name: Validate target artifacts
        run: |
          set -euo pipefail

          AMD64_ARTIFACT_DIR="${DIGEST_ROOT}/targets/amd64"
          ARM64_ARTIFACT_DIR="${DIGEST_ROOT}/targets/arm64"
          EXPECTED_REPOSITORY="${REGISTRY}/${IMAGE_NAMESPACE}/${{ matrix.repository }}"

          for artifact_dir in "${AMD64_ARTIFACT_DIR}" "${ARM64_ARTIFACT_DIR}"; do
            if [ ! -s "${artifact_dir}/reference.txt" ]; then
              echo "::error::target artifact is missing reference.txt"
              exit 1
            fi
            if [ ! -s "${artifact_dir}/digest.txt" ]; then
              echo "::error::target artifact is missing digest.txt"
              exit 1
            fi
            if [ ! -s "${artifact_dir}/repository.txt" ]; then
              echo "::error::target artifact is missing repository.txt"
              exit 1
            fi
            if [ ! -s "${artifact_dir}/arch.txt" ]; then
              echo "::error::target artifact is missing arch.txt"
              exit 1
            fi

            ARTIFACT_REFERENCE="$(tr -d '\n' < "${artifact_dir}/reference.txt")"
            ARTIFACT_DIGEST="$(tr -d '\n' < "${artifact_dir}/digest.txt")"
            ARTIFACT_REPOSITORY="$(tr -d '\n' < "${artifact_dir}/repository.txt")"

            if [ -z "${ARTIFACT_REFERENCE}" ]; then
              echo "::error::target artifact reference is empty"
              exit 1
            fi

            if [ -z "${ARTIFACT_DIGEST}" ]; then
              echo "::error::target artifact digest is empty"
              exit 1
            fi

            if [ "${ARTIFACT_REPOSITORY}" != "${EXPECTED_REPOSITORY}" ]; then
              echo "::error::target artifact repository mismatch"
              exit 1
            fi

            if [ "${ARTIFACT_REFERENCE}" != "${ARTIFACT_REPOSITORY}@${ARTIFACT_DIGEST}" ]; then
              echo "::error::target artifact reference does not match repository and digest"
              exit 1
            fi
          done

          if [ "$(tr -d '\n' < "${AMD64_ARTIFACT_DIR}/arch.txt")" != "amd64" ]; then
            echo "::error::target artifact arch mismatch for amd64"
            exit 1
          fi

          if [ "$(tr -d '\n' < "${ARM64_ARTIFACT_DIR}/arch.txt")" != "arm64" ]; then
            echo "::error::target artifact arch mismatch for arm64"
            exit 1
          fi

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=semver,pattern=v{{major}}

      - name: Create and push multi-arch manifests
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          set -euo pipefail

          AMD64_REFERENCE="$(tr -d '\n' < "${DIGEST_ROOT}/targets/amd64/reference.txt")"
          ARM64_REFERENCE="$(tr -d '\n' < "${DIGEST_ROOT}/targets/arm64/reference.txt")"

          for tag in $TAGS; do
            docker buildx imagetools create \
              -t "$tag" \
              "$AMD64_REFERENCE" \
              "$ARM64_REFERENCE"
          done
